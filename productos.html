<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo de Productos – Polirrubro Doña Rosa</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="assets/logoDR.png" type="image/png" />
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script defer src="script.js"></script>
</head>
<body>
  <header>
    <div class="container topbar">
      <a href="index.html" class="logoBadge">
        <img src="assets/logoDR.png" alt="Logo Polirrubro Doña Rosa">
        <div class="brand">
          <h1>Polirrubro Doña Rosa</h1>
          <small>Tu mercado de barrio, ahora online</small>
        </div>
      </a>
      <button class="nav-toggle" onclick="toggleNav()" aria-label="Menú">☰</button>
      <nav id="mainNav">
        <a href="index.html">Inicio</a>
        <a href="productos.html" class="cta active">Productos</a>
        <a href="contacto.html">Contacto</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section" id="productos">
      <div class="container">
        <h3>Catálogo de Productos</h3>
        <div class="tools">
          <input id="buscador" class="search" placeholder="Buscar producto..." />
          <select id="filtroCategoria" class="filter">
            <option value="">Todas las categorías</option>
          </select>
        </div>
        <div class="products">
          <!-- Se completa dinámicamente desde script.js -->
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <img src="assets/logoDR.png" alt="Logo Polirrubro Doña Rosa">
      <span>© <span id="y"></span> Polirrubro Doña Rosa. Todos los derechos reservados.</span>
      <div class="socials">
        <a href="#" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
        <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
        <a href="https://wa.me/543476495451" aria-label="WhatsApp"><i class="fab fa-whatsapp"></i></a>
      </div>
    </div>
  </footer>

  <!-- Carrito flotante -->
  <div class="floatCart" onclick="toggleCart(true)">
    <span>🛍️ <b id="items">0</b> ítems • <b id="total">$0</b></span>
  </div>

  <!-- Panel lateral carrito -->
  <div id="cartPanel" class="cart-panel">
    <div class="cart-header">
      <h3>🛒 Tu Pedido</h3>
      <button class="closeCart" onclick="toggleCart(false)">✖️</button>
    </div>
    <div id="cartItems" class="cart-items"></div>
    <div class="cart-pago">
      <h3>Forma de pago</h3>
      <label><input type="radio" name="pago" value="Efectivo" checked> Efectivo</label>
      <label><input type="radio" name="pago" value="Débito"> Débito</label>
      <label><input type="radio" name="pago" value="Mercado Pago"> Mercado Pago</label>
    </div>
    <div class="cart-footer">
      <div class="cart-total">
        <b>Total:</b> <span id="cartTotal">$0</span>
      </div>
      <button class="go" onclick="goWhatsApp()">Enviar por WhatsApp</button>
    </div>
  </div>

  <!-- Botón flotante WhatsApp -->
  <a href="https://wa.me/543476495451" class="whatsapp-float" target="_blank" rel="noopener" title="Contactanos por WhatsApp">
    <i class="fab fa-whatsapp"></i>
  </a>

  <script>document.getElementById('y').textContent = new Date().getFullYear();</script>
</body>
</html>
